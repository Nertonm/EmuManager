site_name: EmuManager
site_description: Emulation library manager for auditing, organizing, and verifying ROM collections
theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

nav:
  - Home: index.md
  - Architecture: ARCHITECTURE.md
  - Contributing: CONTRIBUTING.md

plugins:
  - search
